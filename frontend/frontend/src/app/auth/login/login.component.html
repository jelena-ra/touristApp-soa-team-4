<div class="container">
    <form class="registration-form" [formGroup]="loginForm">
        <h2 class="form-title">Kreiraj svoj nalog</h2>
        
        <div class="input-group">
            <label for="username">Korisničko ime</label>
            <input type="text" id="username" formControlName="username" placeholder="Unesite korisničko ime" required>
        </div>

        <div class="input-group">
            <label for="password">Lozinka</label>
            <input type="password" id="password" formControlName="password" placeholder="Unesite lozinku" required>
        </div>
    

        <button type="submit" [disabled]="loginForm.invalid" mat-raised-button type="submit" (click)="login()" color="button">Loguj se</button>
    </form>
</div>
