<div class="container">
    <h1>Kreiraj Turu</h1>
    <div class="new-tour-fields">
        <mat-form-field>
            <mat-label>Ime</mat-label>
            <input type="text" matInput [(ngModel)]="newTour.name">
        </mat-form-field>
        <mat-form-field>
            <mat-label>Opis</mat-label>
            <textarea matInput [(ngModel)]="newTour.description"></textarea>
        </mat-form-field>

        <mat-radio-group [(ngModel)]="newTour.difficulty" aria-label="Select tour difficulty">
            <mat-radio-button *ngFor="let diff of difficulties" [value]="diff">
                {{ diff }}
            </mat-radio-button>
        </mat-radio-group>

        <mat-chip-listbox [(ngModel)]="newTour.tags" multiple>
            <mat-chip-option *ngFor="let tag of tags" [value]="tag">
                {{ tag }}
            </mat-chip-option>
        </mat-chip-listbox>

        <div style="display: flex; gap: 1rem; margin-top: 1rem;">
            <button mat-flat-button (click)="createTour()">Kreiraj</button>
            <button mat-flat-button (click)="onNoClick()">Odustani</button>
        </div>
    </div>
</div>
