<div class="container">
    <h1>All tours</h1>
    <button mat-flat-button (click)="openCreateTour()">Add Tour</button>
    <div  class="all-tours">
        <div *ngFor="let tour of tours">
            <mat-card class="tour">
                <mat-card-header>
                    <mat-card-title>{{ tour.name }}</mat-card-title>
                    <mat-card-subtitle>{{ tour.difficulty }}</mat-card-subtitle>
                </mat-card-header>
                <mat-card-content>
                    <p>{{ tour.description }}</p>
                    <div class="tags" *ngFor="let tag of tour.tags">
                        <mat-chip>{{ tag }}</mat-chip>
                    </div>
                </mat-card-content>
                <mat-card-actions>
                    <button mat-button [routerLink]="['/tours', tour.id]">View Details</button>
                </mat-card-actions>
            </mat-card>
        </div>
    </div>
</div>
