syntax = "proto3";
import "google/protobuf/timestamp.proto";

option go_package = "./proto";

package blog;

message Blog {
  string id = 1;
  string title = 2;
  string content = 3;
  int32 author_id = 4;
  repeated string images = 5;
  int32 number_of_likes = 6;
}

message BlogFull {
  string id = 1;
  string title = 2;
  string content = 3;
  int32 author_id = 4;
  repeated string images = 5;
  int32 number_of_likes = 6;
  repeated Comment comments = 7;
}

message Comment {
  string id = 1;
  int32 user_id = 2;
  string content = 3;
  google.protobuf.Timestamp created_at = 4;
  google.protobuf.Timestamp last_modified = 5;
}

message CreateBlogRequest {
  Blog blog_post = 1;
}

message CreateBlogResponse {
  Blog blog_post = 1;
}

message GetBlogRequest {
  string id = 1;
}

message GetBlogResponse {
  Blog blog_post = 1;
}

message UpdateBlogRequest {
  Blog blog_post = 1;
}

message UpdateBlogResponse {
  Blog blog_post = 1;
}

message DeleteBlogRequest {
  string id = 1;
}

message DeleteBlogResponse {
  bool success = 1;
}

message GetAllBlogsRequest {
}

message GetAllBlogsResponse {
  repeated Blog blogs = 1; 
}
service BlogService {
  rpc CreateBlog (CreateBlogRequest) returns (CreateBlogResponse);
  rpc LikeBlog (LikeBlogRequest) returns (LikeBlogResponse);
  rpc UnikeBlog (LikeBlogRequest) returns (LikeBlogResponse);
  rpc GetAllBlogs (GetAllBlogsRequest) returns (GetAllBlogsResponse);
}

message LikeBlogRequest {
  string blog_id = 1;
  int32 user_id = 2;
}

message LikeBlogResponse {
  BlogFull blog_post = 1;
}