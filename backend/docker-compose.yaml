version: "3.7"
services:

  rabbitmq:
    image: rabbitmq:3-management-alpine
    hostname: rabbitmq
    ports:
      - "5672:5672" # Standardni AMQP port
      - "15672:15672" # Management UI port (opciono, ali korisno za debagovanje)
    environment:
      RABBITMQ_DEFAULT_USER: guest # Ili postavite na sigurnije
      RABBITMQ_DEFAULT_PASS: guest # Ili postavite na sigurnije
    volumes: # <--- DODAJ OVO
      - rabbitmq_data:/var/lib/rabbitmq # Mapiranje za trajno skladištenje podataka
    command: sh -c "chmod 600 /var/lib/rabbitmq/.erlang.cookie && chown rabbitmq:rabbitmq /var/lib/rabbitmq/.erlang.cookie && rabbitmq-server" # service that first sets the correct permissions and then starts RabbitMQ. The rabbitmq user typically has a UID of 999.
    networks:
      - backend
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "check_port_connectivity" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  stakeholder-service:
    image: stakeholder-service:compose_build
    build:
      #context: ./Stakeholders
      #dockerfile: Dockerfile
      context: .        # <---- UMESTO ./Stakeholders
      dockerfile: ./Stakeholders/Dockerfile
    restart: unless-stopped
    networks:
      - backend
    volumes:
      - stakeholder_images_data:/data/sqlite
    ports:
      - "8081:8081"
    env_file:
      - ./Stakeholders/.env
    depends_on:
      rabbitmq: # Sada je 'rabbitmq' ključ u mapi
        condition: service_healthy
      stakeholders-db:
        condition: service_healthy
      saga-db:
        condition: service_healthy

  stakeholders-db:
    image: neo4j:4.4
    container_name: stakeholders-db
    environment:
      NEO4J_AUTH: "neo4j/password"
    ports:
      - "7475:7474"
      - "7688:7687"
    volumes:
      - stakeholders_db_data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p password -a neo4j://localhost:7687 'RETURN 1'"]
     # interval: 10s
      #timeout: 5s
      #retries: 5
      #start_period: 30s
      interval: 10s       # Proveravaj svakih 10 sekundi
      timeout: 15s        # Povećano sa 5s na 15s (daj više vremena da se cypher-shell pokrene i poveže)
      retries: 15         # Povećano sa 5 na 15
      start_period: 60s

  saga-db:
    image: postgres:15
    container_name: saga-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: super
      POSTGRES_DB: saga
    ports:
      - "5443:5432"
    volumes:
      - saga_db_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d saga"]
      interval: 10s
      timeout: 15s
      retries: 15
      start_period: 60s


  blog-service:
    image: blog-service:compose_build
    build:
      #context: ./Blog
      context: .
      dockerfile:  ./Blog/Dockerfile
    networks:
      - backend
    ports:
      - "8082:8082"
    env_file:
      - ./Blog/.env
    depends_on:
      rabbitmq: # Sada je 'rabbitmq' ključ u mapi
        condition: service_healthy
      following-service:
        condition: service_started
      blog-db:          
        condition: service_healthy
    environment:
      - FOLLOWING_SERVICE_ADDR=host.docker.internal:8084


  following-service:
    image: following-service:compose_build
    build:
      context: ./Following
      dockerfile: Dockerfile
    networks:
      - backend
    ports:
      - "8084:8084"
    env_file:
      - ./Following/.env
    depends_on:
      following-db:
        condition: service_healthy

  following-db:
    image: neo4j:4.4
    container_name: following-db
    environment:
      NEO4J_AUTH: "neo4j/mojalutka123"
    ports:
      - 7474:7474
      - 7687:7687
    volumes:
      - following_db_data:/data
    networks:
      - backend
    healthcheck:
      test: [ "CMD-SHELL", "cypher-shell -u neo4j -p mojalutka123 -a neo4j://localhost:7687 'RETURN 1'" ]
      interval: 10s
      timeout: 5s
      retries: 5
     # start_period: 30s
      start_period: 60s

  blog-db:
    image: mongo:latest
    container_name: blog-db
    environment:
      MONGO_INITDB_ROOT_USERNAME: user
      MONGO_INITDB_ROOT_PASSWORD: pass
      MONGO_INITDB_DATABASE: blog_db
    ports:
      - "27018:27017"
    volumes:
      - blog_db_data:/data/db
    networks:
      - backend
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  tour-service:
    image: tour-service:compose_build
    build:
      context: .
      dockerfile: ./Tours/Dockerfile
    networks:
      - backend
    ports:
      - "8083:8083"
    env_file:
      - ./Tours/.env
    environment:
      - JAEGER_ADDRESS=jaeger:4317
    depends_on:
      tour-db:
        condition: service_healthy
      jaeger:
        condition: service_started
    volumes:
      - tours_uploads_data:/app/uploads

  tour-db:
    image: mongo:latest
    container_name: tour-db
    environment:
      MONGO_INITDB_ROOT_USERNAME: user
      MONGO_INITDB_ROOT_PASSWORD: pass
      MONGO_INITDB_DATABASE: tour_db
    ports:
      - "27019:27017"
    volumes:
      - tour_db_data:/data/db
    networks:
      - backend
    healthcheck:
     # test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')", "-u", "user", "-p", "pass", "--authenticationDatabase", "admin" ]
      interval: 10s
      timeout: 5s
      retries: 5
      #start_period: 30s
      start_period: 60s

  purchase-service:
        build:
          context: ./Purchase
          dockerfile: Dockerfile
        container_name: purchase-service
        networks:
          - backend
        ports:
          - "8085:8085"
        env_file:
          - ./Purchase/.env
        environment:
          - DB_HOST=purchase-db
          - DB_PORT=5432
          - DB_USER=postgres
          - DB_PASSWORD=super
          - DB_NAME=purchase_db
        depends_on:
          purchase-db:
            condition: service_healthy

  purchase-db:
    image: postgres:16
    container_name: purchase-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: super
      POSTGRES_DB: purchase_db
    ports:
      - "5433:5432"
    volumes:
      - purchase_db_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  api-gateway:
    build:
      context: .
      dockerfile: ./API_Gateway/Dockerfile
    ports:
      - "8000:8000"
    networks:
      - backend
    env_file:
      - ./API_Gateway/.env
    environment:
      - JAEGER_ADDRESS=jaeger:4317
    depends_on:
      - blog-service
      - stakeholder-service
      - jaeger
      - purchase-service
      -  tour-service
    volumes:
      - tours_uploads_data:/app/uploads
  
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    networks:
      - backend
  
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - backend
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - backend
    depends_on:
      - prometheus
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    container_name: loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - backend
    restart: unless-stopped

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./promtail-config.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    networks:
      - backend
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    ports:
      - "16686:16686"
      - "4317:4317"
    networks:
      - backend
    restart: unless-stopped

networks:
  backend:
    driver: bridge

volumes:
  blog_db_data:
  stakeholders_db_data:
  purchase_db_data:
  following_db_data:
  tour_db_data:
  grafana_data:
  stakeholder_images_data:
  tours_uploads_data:
  saga_db_data:
  rabbitmq_data: