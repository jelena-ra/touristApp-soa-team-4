version: "3.7"
services:

  stakeholder-service:
    image: stakeholder-service:compose_build
    build:
      context: ./Stakeholders
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - backend
    ports:
      - "8081:8081"
    env_file:
      - ./Stakeholders/.env
    depends_on:
      stakeholders-db:
        condition: service_healthy

  stakeholders-db:
    image: neo4j:4.4
    container_name: stakeholders-db
    environment:
      NEO4J_AUTH: "neo4j/mojalutka123"
    ports:
      - "7475:7474"
      - "7688:7687"
    volumes:
      - stakeholders_db_data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p mojalutka123 -a neo4j://localhost:7687 'RETURN 1'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  blog-service:
    image: blog-service:compose_build
    build:
      context: ./Blog
      dockerfile: Dockerfile
    networks:
      - backend
    ports:
      - "8082:8082"
      - "8086:8086"
    env_file:
      - ./Blog/.env
    volumes:
      - blog_images_data:/app/images
    depends_on:
      following-service:
        condition: service_started
      blog-db:          
        condition: service_healthy
    environment:
      - FOLLOWING_SERVICE_ADDR=host.docker.internal:8084

  following-service:
    image: following-service:compose_build
    build:
      context: ./Following
      dockerfile: Dockerfile
    networks:
      - backend
    ports:
      - "8084:8084"
    env_file:
      - ./Following/.env
    depends_on:
      following-db:
        condition: service_healthy

  following-db:
    image: neo4j:4.4
    container_name: following-db
    environment:
      NEO4J_AUTH: "neo4j/mojalutka123"
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - following_db_data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p mojalutka123 -a neo4j://localhost:7687 'RETURN 1'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  blog-db:
    image: mongo:latest
    container_name: blog-db
    environment:
      MONGO_INITDB_ROOT_USERNAME: user
      MONGO_INITDB_ROOT_PASSWORD: pass
      MONGO_INITDB_DATABASE: blog_db
    ports:
      - "27018:27017"
    volumes:
      - blog_db_data:/data/db
    networks:
      - backend
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  tour-service:
    image: tour-service:compose_build
    build:
      context: .
      dockerfile: ./Tours/Dockerfile
    networks:
      - backend
    ports:
      - "8083:8083"
    env_file:
      - ./Tours/.env
    environment:
      - JAEGER_ADDRESS=jaeger:4317
    depends_on:
      tour-db:
        condition: service_healthy
      jaeger:
        condition: service_started

  tour-db:
    image: mongo:latest
    container_name: tour-db
    environment:
      MONGO_INITDB_ROOT_USERNAME: user
      MONGO_INITDB_ROOT_PASSWORD: pass
      MONGO_INITDB_DATABASE: tour_db
    ports:
      - "27019:27017"
    volumes:
      - tour_db_data:/data/db
    networks:
      - backend
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    
  api-gateway:
    build:
      context: .
      dockerfile: ./API_Gateway/Dockerfile
    ports:
      - "8000:8000"
    networks:
      - backend
    env_file:
      - ./API_Gateway/.env
    environment:
      - JAEGER_ADDRESS=jaeger:4317
    depends_on:
      - blog-service
      - stakeholder-service
      - jaeger
  
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    networks:
      - backend
  
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - backend
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - backend
    depends_on:
      - prometheus
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    container_name: loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - backend
    restart: unless-stopped

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./promtail-config.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    networks:
      - backend
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    ports:
      - "16686:16686"
      - "4317:4317"
    networks:
      - backend
    restart: unless-stopped

networks:
  backend:
    driver: bridge

volumes:
  blog_db_data:
  stakeholders_db_data:
  following_db_data:
  tour_db_data:
  grafana_data:
  blog_images_data: